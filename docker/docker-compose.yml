services:
  muxshed:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
      - "1935:1935"
      - "9000:9000/udp"
      - "8443:8443"
    volumes:
      - muxshed-data:/config
    environment:
      - MUXSHED_DB_PATH=/config/muxshed.db
      - MUXSHED_DATA_DIR=/config
      - MUXSHED_LOG_LEVEL=info
      - RUST_LOG=info
    restart: unless-stopped

volumes:
  muxshed-data:
