# Dev compose — no GStreamer, stub pipeline, debug logging.
# Works with both docker compose and podman-compose.

services:
  muxshed:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - muxshed-dev-data:/config
    environment:
      - MUXSHED_DB_PATH=/config/muxshed.db
      - MUXSHED_DATA_DIR=/config
      - MUXSHED_WEB_DIR=/app/web
      - MUXSHED_LOG_LEVEL=debug
      - RUST_LOG=debug

volumes:
  muxshed-dev-data:
