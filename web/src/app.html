<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
		<link href="https://cdn.jsdelivr.net/fontsource/fonts/google-sans@latest/latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
		<style>
			@font-face {
				font-family: 'Google Sans';
				font-style: normal;
				font-weight: 400;
				font-display: swap;
				src: url('https://cdn.jsdelivr.net/fontsource/fonts/google-sans@latest/latin-400-normal.woff2') format('woff2');
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
